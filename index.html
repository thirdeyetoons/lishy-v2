<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lishyy Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<nav class="bg-slate-800 p-4 border-b border-slate-700">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-white">Lishyy</a>
        <div class="space-x-4 text-sm text-slate-300">
            <a href="/about" class="hover:text-white">About</a>
            <a href="/contact" class="hover:text-white">Contact</a>
            <a href="/privacy" class="hover:text-white">Privacy</a>
            <a href="/terms" class="hover:text-white">Terms</a>
            <a href="/refund" class="hover:text-white">Refund</a>
        </div>
    </div>
</nav>    
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-6">Lishyy URL Shortener</h1>
        <input id="url" type="url" placeholder="https://example.com" 
               class="w-full p-3 rounded bg-slate-700 border border-slate-600 mb-4 focus:outline-none">
        <input id="slug" placeholder="Custom slug (optional)" class="w-full p-3 rounded bg-slate-700 mb-4">
        <button id="btn" class="w-full bg-blue-500 hover:bg-blue-600 p-3 rounded font-bold transition">Shorten URL</button>
        <div id="result" class="hidden mt-6 p-4 bg-slate-700 rounded">
            <p class="text-sm mb-2">Your shortened link:</p>
            <a id="link" target="_blank" class="text-blue-400 underline break-all"></a>
        </div>
    </div>

    <script>
        document.getElementById('btn').onclick = async () => {
    const url = document.getElementById('url').value;
    const slug = document.getElementById('slug').value; // Get the slug

    const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        // Ensure both fields are sent
        body: JSON.stringify({ url, slug }) 
    });

    const data = await res.json();
    
    if (res.ok) {
        const link = document.getElementById('link');
        link.href = data.shortUrl;
        link.innerText = data.shortUrl;
        document.getElementById('result').classList.remove('hidden');
    } else {
        alert("Error: " + data.error); // This will alert "Slug already taken" if it fails
    }
};
    </script>
</body>
</html>
